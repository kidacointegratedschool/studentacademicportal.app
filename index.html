<title>KIS Student Academic Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* removes scrolling for app-like feel */
    background-color: #000;
  }

  .app-container {
    width: 100vw;
    height: 100vh;
    max-width: 480px; /* typical mobile width */
    margin: 0 auto;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Hide on larger screens (optional strict mobile only) */
  @media (min-width: 769px) {
    body::before {
      content: "Please open on a mobile device";
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 18px;
      color: #333;
      background: #fff;
    }

    .app-container {
      display: none;
    }
  }
</style>
</head>

<body>

<div class="app-container">
  <iframe 
    src="https://script.google.com/macros/s/AKfycbxOoxydIArLjREWTunPQsnLp6HhFwImiBV9is8BOqzV6IWSpBvZ0lseP2srvPTISDyc/exec"
    allowfullscreen>
  </iframe>
</div>

<script>
window.onload = function() {
  const iframe = document.querySelector('iframe');
  if (iframe.requestFullscreen) {
    iframe.requestFullscreen().catch(() => {});
  }
};
</script>
