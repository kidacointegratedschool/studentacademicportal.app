<title>KIS Student Academic Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
  }

  .iframe-container {
    width: 100%;
    max-width: 1200px; /* prevents stretching on large screens */
    height: 100vh;
  }

  .iframe-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Optional: adjust height for smaller devices */
  @media (max-width: 768px) {
    .iframe-container {
      height: 100vh;
    }
  }
</style>
</head>

<body>

<div class="iframe-container">
  <iframe 
    src="https://script.google.com/macros/s/AKfycbxOoxydIArLjREWTunPQsnLp6HhFwImiBV9is8BOqzV6IWSpBvZ0lseP2srvPTISDyc/exec"
    allowfullscreen>
  </iframe>
</div>

<script>
window.onload = function() {
  const iframe = document.querySelector('iframe');
  if (iframe.requestFullscreen) {
    iframe.requestFullscreen().catch(err => {
      console.error("Fullscreen error:", err.message);
    });
  }
};
</script>
